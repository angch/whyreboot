name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (both Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --release

      - name: Build release binaries (both architectures)
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create -output whyreboot-cli-macos-universal \
            target/aarch64-apple-darwin/release/whyreboot \
            target/x86_64-apple-darwin/release/whyreboot
          file whyreboot-cli-macos-universal

      # Smoke test: scan the runner's own unified log for the last hour.
      - name: Smoke test on live unified log
        run: |
          ./whyreboot-cli-macos-universal --help
          ./whyreboot-cli-macos-universal --since "1 hour ago" --no-color || true

      - name: Show binary size
        run: ls -la whyreboot-cli-macos-universal

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: whyreboot-cli-macos-universal
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    # Serialized so the release-upload steps never race to create the tag's release.
    needs: build-macos

    steps:
      - uses: actions/checkout@v4

      # No musl-tools/C cross-toolchain needed: the crate has no C dependencies
      # and rust-std ships a prebuilt musl libc, so the target alone suffices.
      - name: Install Rust stable (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --release --target x86_64-unknown-linux-musl

      # default-members = ["."] keeps the Windows-only GUI out of this build.
      - name: Build release binary (static musl)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Verify fully static
        run: |
          file target/x86_64-unknown-linux-musl/release/whyreboot
          ldd  target/x86_64-unknown-linux-musl/release/whyreboot 2>&1 | grep -qE 'not a dynamic|statically linked'

      - name: Compress with UPX
        run: |
          sudo apt-get update -q && sudo apt-get install -qy upx-ucl
          upx --best --lzma target/x86_64-unknown-linux-musl/release/whyreboot

      - name: Smoke test compressed binary
        run: target/x86_64-unknown-linux-musl/release/whyreboot --help

      - name: Rename artifact
        run: cp target/x86_64-unknown-linux-musl/release/whyreboot whyreboot-cli-x86_64-linux

      - name: Show binary size
        run: ls -la whyreboot-cli-x86_64-linux

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: whyreboot-cli-x86_64-linux
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: windows-latest
    # Serialized after the Linux job so the two release-upload steps never race
    # to create the same tag's release (action-gh-release updates if it exists).
    needs: build-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Compress with UPX
        shell: pwsh
        run: |
          choco install upx --yes --no-progress
          upx --best --lzma target\release\whyreboot.exe
          upx --best --lzma target\release\whyreboot-gui.exe

      - name: Rename artifacts
        shell: pwsh
        run: |
          Copy-Item target\release\whyreboot.exe     whyreboot-cli-x86_64-windows.exe
          Copy-Item target\release\whyreboot-gui.exe whyreboot-gui-x86_64-windows.exe

      - name: Show binary sizes
        shell: pwsh
        run: |
          Get-Item whyreboot-cli-x86_64-windows.exe, whyreboot-gui-x86_64-windows.exe |
            Select-Object Name, @{N='KB';E={[math]::Round($_.Length/1KB,1)}}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            whyreboot-cli-x86_64-windows.exe
            whyreboot-gui-x86_64-windows.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
