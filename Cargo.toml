[package]
name = "whyreboot"
version = "0.1.0"
edition = "2024"

[dependencies]
windows = { version = "0.62.2", features = [
    "Win32_System_EventLog",
    "Win32_System_Console",
    "Win32_System_Registry",
    "Win32_Foundation",
] }
chrono = { version = "0.4.39", default-features = false, features = ["clock", "std"] }

